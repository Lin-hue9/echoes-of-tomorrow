<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Echoes of Tomorrow</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="app">
    <div class="particles particles-1"></div>
    <div class="particles particles-2"></div>
    <div class="particles particles-3"></div>

    {% if session.user_id %}
    <div class="global-topbar">
        <div class="logo-mini">🌌 ECHOES</div>
        <a href="{{ url_for('logout') }}" class="logout-btn">Exit Timeline</a>
    </div>
    {% endif %}

    <main class="screen-container">
        {% block content %}{% endblock %}
    </main>
</div>
<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
